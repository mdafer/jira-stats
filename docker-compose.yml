services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${SERVER_PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - cache-data:/app/server/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_PROJECT_TITLE=${VITE_PROJECT_TITLE}
    ports:
      - "${VITE_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  cache-data:
